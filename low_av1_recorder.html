<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>AV1 低容量動画撮影 PRO</title>
<style>
 /* 全体 */
body {
  margin: 0;
  padding: 0;
  background: #111;
  color: #fff;
  font-family: sans-serif;
}

/* プレビュー */
#previewWrapper {
  position: relative;
  width: 100vw;
  height: 70vh;
  overflow: hidden;
}
video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* グリッド */
#gridOverlay {
  position: absolute;
  inset: 0;
  pointer-events: none;
  display: none;
}
.grid-line {
  position: absolute;
  background: rgba(255,255,255,0.4);
}
.grid-v1 { left: 33.33%; top: 0; bottom: 0; width: 2px; }
.grid-v2 { left: 66.66%; top: 0; bottom: 0; width: 2px; }
.grid-h1 { top: 33.33%; left: 0; right: 0; height: 2px; }
.grid-h2 { top: 66.66%; left: 0; right: 0; height: 2px; }

/* 録画ボタン */
#recordBtn {
  width: 100%;
  height: 70px;
  font-size: 26px;
  margin-top: 6px;
  background: #c62828;
  border: none;
  border-radius: 8px;
}
#recordBtn.recording {
  background: #2e7d32;
}

/* 下部コントロール */
.controlRow {
  width: 100%;
  padding: 8px;
  box-sizing: border-box;
}
.controlRow label {
  font-size: 20px;
}
.controlRow input[type="range"] {
  width: 100%;
  height: 40px;
}

/* グリッドボタン */
#gridToggleBtn {
  width: 100%;
  height: 50px;
  font-size: 20px;
  margin-top: 4px;
}

</style>
</head>
<body>

<h2>AV1 低容量動画撮影 PRO</h2>

<div id="settingsPanel">
  <h3>撮影設定</h3>

  <label for="resolution">解像度：</label>
  <select id="resolution">
    <option value="360x640" selected>360 × 640（デフォルト）</option>
    <option value="320x180">320 × 180（超低容量）</option>
    <option value="1280x720">1280 × 720（高画質）</option>
  </select>

  <label for="fps">FPS：</label>
  <select id="fps">
    <option value="10" selected>10（デフォルト）</option>
    <option value="15">15</option>
    <option value="30">30</option>
  </select>

  <button id="applySettings">設定を適用（カメラ再起動）</button>
</div>

<div id="previewContainer">
  <div id="previewWrapper">
    <video id="preview" autoplay playsinline muted></video>
    <div id="gridOverlay">
      <div class="grid-line grid-v1"></div>
      <div class="grid-line grid-v2"></div>
      <div class="grid-line grid-h1"></div>
      <div class="grid-line grid-h2"></div>
    </div>
  </div>

  <div id="rightControls">
    <div id="zoomLabel">ズーム</div>
    <input id="zoomSlider" type="range" min="1" max="1" step="0.01" value="1">
    <button id="gridToggleBtn">グリッド ON</button>
  </div>
</div>

<div id="bottomControls">
  <button id="recordBtn">録画開始</button>

  <div class="sliderRow" id="exposureRow" style="display:none;">
    <label for="exposureSlider">露出</label>
    <input id="exposureSlider" type="range" min="0" max="0" step="1" value="0">
  </div>

  <div class="sliderRow">
    <label>フォーカスモード</label>
    <button id="focusModeBtn">フォーカス：AUTO</button>
  </div>

  <div class="sliderRow" id="focusRow" style="display:none;">
    <label for="focusSlider">フォーカス（MANUAL）</label>
    <input id="focusSlider" type="range" min="0" max="1" step="0.01" value="0">
  </div>

  <div id="status">準備中...</div>
</div>

<script>
let stream = null;
let recorder = null;
let chunks = [];
let videoTrack = null;
let capabilities = null;
let settings = null;

let focusMode = "auto"; // "auto" or "manual"
let zoomSupported = false;
let exposureSupported = false;
let focusDistanceSupported = false;

const preview = document.getElementById("preview");
const statusEl = document.getElementById("status");
const zoomSlider = document.getElementById("zoomSlider");
const zoomLabel = document.getElementById("zoomLabel");
const exposureRow = document.getElementById("exposureRow");
const exposureSlider = document.getElementById("exposureSlider");
const focusModeBtn = document.getElementById("focusModeBtn");
const focusRow = document.getElementById("focusRow");
const focusSlider = document.getElementById("focusSlider");
const gridOverlay = document.getElementById("gridOverlay");
const gridToggleBtn = document.getElementById("gridToggleBtn");
const recordBtn = document.getElementById("recordBtn");

async function startCamera() {
  if (stream) {
    stream.getTracks().forEach(t => t.stop());
    stream = null;
    videoTrack = null;
  }

  const res = document.getElementById("resolution").value.split("x");
  const fps = parseInt(document.getElementById("fps").value, 10);

  const constraints = {
    audio: true,
    video: {
      width: { ideal: parseInt(res[0], 10) },
      height: { ideal: parseInt(res[1], 10) },
      frameRate: { ideal: fps },
      facingMode: "environment"
    }
  };

  try {
    stream = await navigator.mediaDevices.getUserMedia(constraints);
    preview.srcObject = stream;
    statusEl.textContent = "カメラ準備完了";

    videoTrack = stream.getVideoTracks()[0];
    capabilities = videoTrack.getCapabilities ? videoTrack.getCapabilities() : {};
    settings = videoTrack.getSettings ? videoTrack.getSettings() : {};

    setupCameraControls();
  } catch (e) {
    console.error(e);
    statusEl.textContent = "カメラ取得失敗: " + e.message;
  }
}

function setupCameraControls() {
  zoomSupported = !!capabilities.zoom;
  exposureSupported = !!capabilities.exposureCompensation;
  focusDistanceSupported = !!capabilities.focusDistance;

  // ズーム
  if (zoomSupported) {
    const min = capabilities.zoom.min || 1;
    const max = capabilities.zoom.max || 1;
    const step = capabilities.zoom.step || 0.1;
    zoomSlider.min = min;
    zoomSlider.max = max;
    zoomSlider.step = step;
    zoomSlider.value = settings.zoom || min;
    zoomLabel.textContent = "ズーム";
    zoomSlider.disabled = false;
  } else {
    zoomSlider.min = 1;
    zoomSlider.max = 1;
    zoomSlider.value = 1;
    zoomSlider.disabled = true;
    zoomLabel.textContent = "ズーム不可";
  }

  // 露出
  if (exposureSupported) {
    exposureRow.style.display = "block";
    const min = capabilities.exposureCompensation.min;
    const max = capabilities.exposureCompensation.max;
    const step = capabilities.exposureCompensation.step || 1;
    exposureSlider.min = min;
    exposureSlider.max = max;
    exposureSlider.step = step;
    exposureSlider.value = settings.exposureCompensation || 0;
  } else {
    exposureRow.style.display = "none";
  }

  // フォーカス
  if (focusDistanceSupported) {
    // MANUAL 用スライダーは capabilities に合わせる
    const min = capabilities.focusDistance.min || 0;
    const max = capabilities.focusDistance.max || 1;
    const step = capabilities.focusDistance.step || 0.01;
    focusSlider.min = min;
    focusSlider.max = max;
    focusSlider.step = step;
    focusSlider.value = settings.focusDistance || min;
  } else {
    focusRow.style.display = "none";
  }

  // 初期は AUTO
  focusMode = "auto";
  focusModeBtn.textContent = "フォーカス：AUTO";
  focusRow.style.display = "none";
  applyFocusMode();
}

function createRecorder() {
  const optionsList = [
    { mimeType: "video/webm;codecs=av1", videoBitsPerSecond: 250000 },
    { mimeType: "video/webm;codecs=vp9", videoBitsPerSecond: 250000 },
    { mimeType: "video/webm;codecs=vp8", videoBitsPerSecond: 250000 },
    {}
  ];
  for (const opt of optionsList) {
    try {
      const r = new MediaRecorder(stream, opt);
      console.log("MediaRecorder created with", opt);
      return r;
    } catch (e) {
      console.warn("MediaRecorder option failed:", opt, e);
    }
  }
  return null;
}

function autoSave(blob) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const now = new Date();
  const fileName =
    "video_" +
    now.getFullYear() +
    ("0" + (now.getMonth() + 1)).slice(-2) +
    ("0" + now.getDate()).slice(-2) + "_" +
    ("0" + now.getHours()).slice(-2) +
    ("0" + now.getMinutes()).slice(-2) +
    ("0" + now.getSeconds()).slice(-2) +
    ".webm";

  a.href = url;
  a.download = fileName;
  a.click();
  URL.revokeObjectURL(url);
}

// イベント

document.getElementById("applySettings").onclick = () => {
  startCamera();
};
// 差し替えここから
/* ズーム（横スライダー） */
zoomSlider.addEventListener("input", () => {
  if (!videoTrack || !zoomSupported) return;
  videoTrack.applyConstraints({ advanced: [{ zoom: parseFloat(zoomSlider.value) }] });
});

/* グリッド ON/OFF */
gridToggleBtn.addEventListener("click", () => {
  const show = gridOverlay.style.display !== "block";
  gridOverlay.style.display = show ? "block" : "none";
  gridToggleBtn.textContent = show ? "グリッド OFF" : "グリッド ON";
});

/* 露出 AUTO / MANUAL */
exposureModeBtn.addEventListener("click", () => {
  if (!exposureSupported) return;

  if (exposureMode === "auto") {
    exposureMode = "manual";
    exposureModeBtn.textContent = "露出：MANUAL";
    exposureRow.style.display = "block";
  } else {
    exposureMode = "auto";
    exposureModeBtn.textContent = "露出：AUTO";
    exposureRow.style.display = "none";
    videoTrack.applyConstraints({ advanced: [{ exposureMode: "continuous" }] });
  }
});

/* 露出スライダー */
exposureSlider.addEventListener("input", () => {
  if (exposureMode !== "manual") return;
  videoTrack.applyConstraints({
    advanced: [{ exposureCompensation: parseFloat(exposureSlider.value) }]
  });
});

/* フォーカス AUTO / MANUAL */
focusModeBtn.addEventListener("click", () => {
  if (!focusDistanceSupported) return;

  if (focusMode === "auto") {
    focusMode = "manual";
    focusModeBtn.textContent = "フォーカス：MANUAL";
    focusRow.style.display = "block";
  } else {
    focusMode = "auto";
    focusModeBtn.textContent = "フォーカス：AUTO";
    focusRow.style.display = "none";
    videoTrack.applyConstraints({ advanced: [{ focusMode: "continuous" }] });
  }
});

/* フォーカススライダー */
focusSlider.addEventListener("input", () => {
  if (focusMode !== "manual") return;
  videoTrack.applyConstraints({
    advanced: [{ focusDistance: parseFloat(focusSlider.value) }]
  });
});

 // 差し替えここまで 
  applyFocusMode();
});

function applyFocusMode() {
  if (!videoTrack) return;
  if (focusMode === "auto") {
    // 端末によっては focusMode がない場合もあるので try
    videoTrack.applyConstraints({ advanced: [{ focusMode: "continuous" }] }).catch(() => {});
  } else {
    const d = parseFloat(focusSlider.value);
    videoTrack.applyConstraints({ advanced: [{ focusMode: "manual", focusDistance: d }] }).catch(console.error);
  }
}

focusSlider.addEventListener("input", () => {
  if (focusMode !== "manual" || !videoTrack || !focusDistanceSupported) return;
  const d = parseFloat(focusSlider.value);
  videoTrack.applyConstraints({ advanced: [{ focusMode: "manual", focusDistance: d }] }).catch(console.error);
});

gridToggleBtn.addEventListener("click", () => {
  if (gridOverlay.style.display === "none" || gridOverlay.style.display === "") {
    gridOverlay.style.display = "block";
    gridToggleBtn.textContent = "グリッド OFF";
  } else {
    gridOverlay.style.display = "none";
    gridToggleBtn.textContent = "グリッド ON";
  }
});

recordBtn.addEventListener("click", () => {
  if (!recorder) {
    recorder = createRecorder();
    if (!recorder) {
      statusEl.textContent = "MediaRecorder が利用できません";
      return;
    }
    recorder.ondataavailable = e => {
      if (e.data && e.data.size > 0) chunks.push(e.data);
    };
    recorder.onstop = () => {
      const blob = new Blob(chunks, { type: "video/webm" });
      chunks = [];
      autoSave(blob);
      statusEl.textContent = "保存完了";
      recordBtn.classList.remove("recording");
      recordBtn.textContent = "録画開始";
    };
  }

  if (recorder.state === "inactive") {
    recorder.start();
    recordBtn.classList.add("recording");
    recordBtn.textContent = "録画停止";
    statusEl.textContent = "録画中...";
  } else if (recorder.state === "recording") {
    recorder.stop();
    statusEl.textContent = "保存中...";
  }
});

// 初期起動
startCamera();
</script>

</body>
</html>
