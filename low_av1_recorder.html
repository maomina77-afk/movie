<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AV1 低容量動画撮影</title>
<style>
  :root {
    --primary: #ff3b30;
    --primary-active: #ff6b63;
    --recording: #34c759;
    --bg-overlay: rgba(0, 0, 0, 0.6);
    --text: #ffffff;
  }

  body {
    margin: 0;
    padding: 0;
    background: #000;
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    overflow: hidden; /* スクロール禁止 */
    touch-action: none;
  }

  /* 全画面プレビュー */
  #previewWrapper {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    z-index: 1;
    background: #000;
  }
  video {
    width: 100%;
    height: 100%;
    object-fit: contain; /* 画面に収める（coverにすると見切れるため） */
  }

  /* グリッド */
  #gridOverlay {
    position: absolute;
    inset: 0;
    pointer-events: none;
    display: none;
    z-index: 2;
  }
  .grid-line {
    position: absolute;
    background: rgba(255,255,255,0.4);
  }
  .grid-v1 { left: 33.33%; top: 0; bottom: 0; width: 1px; }
  .grid-v2 { left: 66.66%; top: 0; bottom: 0; width: 1px; }
  .grid-h1 { top: 33.33%; left: 0; right: 0; height: 1px; }
  .grid-h2 { top: 66.66%; left: 0; right: 0; height: 1px; }

  /* UIレイヤー (カメラの上に重なる部分) */
  #uiLayer {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 10;
    pointer-events: none; /* UIの隙間は下のカメラを触れるように */
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  /* 操作可能な要素のポインターイベントを復活 */
  #uiLayer > * {
    pointer-events: auto;
  }

  /* 上部バー */
  #topBar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, transparent 100%);
  }

  #status {
    font-size: 14px;
    background: rgba(0,0,0,0.5);
    padding: 4px 10px;
    border-radius: 12px;
    backdrop-filter: blur(4px);
  }

  .icon-btn {
    background: rgba(255,255,255,0.2);
    border: none;
    color: white;
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 14px;
    backdrop-filter: blur(4px);
  }

  /* 設定パネル (モーダル) */
  #settingsPanel {
    position: absolute;
    top: 60px;
    right: 16px;
    background: var(--bg-overlay);
    backdrop-filter: blur(8px);
    border-radius: 12px;
    padding: 16px;
    width: 240px;
    display: none;
    border: 1px solid rgba(255,255,255,0.1);
  }
  #settingsPanel.show { display: block; }
  #settingsPanel label { display: block; font-size: 12px; margin-bottom: 4px; color: #ccc; }
  #settingsPanel select { width: 100%; margin-bottom: 12px; padding: 8px; border-radius: 6px; background: #333; color: white; border: none; }
  #applySettings { width: 100%; padding: 10px; background: #444; color: white; border: none; border-radius: 6px; font-weight: bold; }

  /* 下部コントロールエリア */
  #bottomBar {
    background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 100%);
    padding: 20px 16px 40px 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  /* スライダーとトグルボタンの行 */
  .control-group {
    background: var(--bg-overlay);
    backdrop-filter: blur(4px);
    border-radius: 12px;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .row {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .row-label { width: 60px; font-size: 12px; text-align: right; color: #aaa; }
  .row-control { flex: 1; display: flex; align-items: center; gap: 8px; }
  
  input[type="range"] {
    width: 100%;
    height: 30px;
    margin: 0;
  }

  .toggle-btn {
    flex: 1;
    background: #333;
    color: white;
    border: 1px solid #555;
    padding: 8px;
    border-radius: 6px;
    font-size: 12px;
  }
  .toggle-btn.active { background: #555; border-color: #777; }

  /* 録画ボタンエリア */
  #recordContainer {
    display: flex;
    justify-content: center;
    align-items: center;
    margin-top: 16px;
  }

  #recordBtn {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    background: var(--primary);
    border: 4px solid white;
    outline: 2px solid transparent;
    box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    transition: all 0.2s ease;
    text-indent: -9999px; /* 文字を隠す */
  }
  
  #recordBtn:active { transform: scale(0.95); background: var(--primary-active); }
  
  #recordBtn.recording {
    background: var(--recording);
    border-radius: 20px; /* 録画中は四角っぽくする */
    transform: scale(0.8);
  }

</style>
</head>
<body>

<div id="previewWrapper">
  <video id="preview" autoplay playsinline muted></video>
  <div id="gridOverlay">
    <div class="grid-line grid-v1"></div>
    <div class="grid-line grid-v2"></div>
    <div class="grid-line grid-h1"></div>
    <div class="grid-line grid-h2"></div>
  </div>
</div>

<div id="uiLayer">
  
  <div id="topBar">
    <button id="gridToggleBtn" class="icon-btn">グリッド</button>
    <div id="status">準備中...</div>
    <button id="settingsToggleBtn" class="icon-btn">⚙️ 設定</button>
  </div>

  <div id="settingsPanel">
    <label>解像度：</label>
    <select id="resolution">
      <option value="480x640" selected>480 × 640（標準）</option>
      <option value="135x180">135 × 180（超低容量）</option>
      <option value="960x1280">960 × 1280（高画質）</option>
    </select>
    <label>FPS：</label>
    <select id="fps">
      <option value="10" selected>10 fps</option>
      <option value="15">15 fps</option>
      <option value="30">30 fps</option>
    </select>
    <button id="applySettings">適用（再起動）</button>
  </div>

  <div id="bottomBar">
    
    <div class="control-group">
      <div class="row">
        <div class="row-label">ズーム</div>
        <div class="row-control">
          <input id="zoomSlider" type="range" min="1" max="1" step="0.01" value="1">
        </div>
      </div>

      <div class="row">
        <div class="row-label">露出</div>
        <div class="row-control">
          <button id="exposureModeBtn" class="toggle-btn">AUTO</button>
        </div>
      </div>
      <div class="row" id="exposureRow" style="display:none;">
        <div class="row-label"></div>
        <div class="row-control">
          <input id="exposureSlider" type="range" min="0" max="0" step="1" value="0">
        </div>
      </div>

      <div class="row">
        <div class="row-label">フォーカス</div>
        <div class="row-control">
          <button id="focusModeBtn" class="toggle-btn">AUTO</button>
        </div>
      </div>
      <div class="row" id="focusRow" style="display:none;">
        <div class="row-label"></div>
        <div class="row-control">
          <input id="focusSlider" type="range" min="0" max="1" step="0.01" value="0">
        </div>
      </div>
    </div>

    <div id="recordContainer">
      <button id="recordBtn">録画開始</button>
    </div>

  </div>
</div>

<script>
// UI制御用追加スクリプト
const settingsToggleBtn = document.getElementById('settingsToggleBtn');
const settingsPanel = document.getElementById('settingsPanel');

settingsToggleBtn.addEventListener('click', () => {
  settingsPanel.classList.toggle('show');
});

// 設定適用後にパネルを閉じる
document.getElementById("applySettings").addEventListener("click", () => {
  settingsPanel.classList.remove('show');
});


// 以下、元のJavaScriptロジック（そのまま）
let stream, recorder, chunks = [];
let videoTrack, capabilities, settings;
let zoomSupported, exposureSupported, focusDistanceSupported;
let exposureMode = "auto", focusMode = "auto";

const preview = document.getElementById("preview");
const statusEl = document.getElementById("status");
const zoomSlider = document.getElementById("zoomSlider");
const gridOverlay = document.getElementById("gridOverlay");
const gridToggleBtn = document.getElementById("gridToggleBtn");
const exposureModeBtn = document.getElementById("exposureModeBtn");
const exposureRow = document.getElementById("exposureRow");
const exposureSlider = document.getElementById("exposureSlider");
const focusModeBtn = document.getElementById("focusModeBtn");
const focusRow = document.getElementById("focusRow");
const focusSlider = document.getElementById("focusSlider");
const recordBtn = document.getElementById("recordBtn");

async function startCamera() {
  if (stream) stream.getTracks().forEach(t => t.stop());
  const res = document.getElementById("resolution").value.split("x");
  const fps = parseInt(document.getElementById("fps").value, 10);
  const constraints = {
    audio: true,
    video: {
      width: { ideal: parseInt(res[0], 10) },
      height: { ideal: parseInt(res[1], 10) },
      frameRate: { ideal: fps },
      facingMode: "environment"
    }
  };
  try {
    stream = await navigator.mediaDevices.getUserMedia(constraints);
    preview.srcObject = stream;
    statusEl.textContent = "待機中";
    videoTrack = stream.getVideoTracks()[0];
    capabilities = videoTrack.getCapabilities();
    settings = videoTrack.getSettings();
    setupControls();
  } catch (e) {
    statusEl.textContent = "カメラ取得失敗: " + e.message;
  }
}

function setupControls() {
  zoomSupported = !!capabilities.zoom;
  exposureSupported = !!capabilities.exposureCompensation;
  focusDistanceSupported = !!capabilities.focusDistance;

  if (zoomSupported) {
    zoomSlider.min = capabilities.zoom.min;
    zoomSlider.max = capabilities.zoom.max;
    zoomSlider.step = capabilities.zoom.step || 0.1;
    zoomSlider.value = settings.zoom || capabilities.zoom.min;
    zoomSlider.disabled = false;
  } else {
    zoomSlider.min = 1;
    zoomSlider.max = 1;
    zoomSlider.value = 1;
    zoomSlider.disabled = true;
  }

  // 露出
  if (exposureSupported) {
    const min = capabilities.exposureCompensation.min;
    const max = capabilities.exposureCompensation.max;
    const step = capabilities.exposureCompensation.step || 1;
    exposureSlider.min = min;
    exposureSlider.max = max;
    exposureSlider.step = step;
    exposureSlider.value = settings.exposureCompensation || 0;
    exposureMode = "auto";
    exposureModeBtn.textContent = "AUTO";
    exposureRow.style.display = "none";
  } else {
    exposureModeBtn.disabled = true;
    exposureModeBtn.textContent = "未対応";
  }

  // フォーカス
  if (focusDistanceSupported) {
    const min = capabilities.focusDistance.min || 0;
    const max = capabilities.focusDistance.max || 1;
    const step = capabilities.focusDistance.step || 0.01;
    focusSlider.min = min;
    focusSlider.max = max;
    focusSlider.step = step;
    focusSlider.value = settings.focusDistance || min;
    focusMode = "auto";
    focusModeBtn.textContent = "AUTO";
    focusRow.style.display = "none";
  } else {
    focusModeBtn.disabled = true;
    focusModeBtn.textContent = "未対応";
  }

  applyExposureMode();
  applyFocusMode();
}

/* カメラ制御 */
zoomSlider.addEventListener("input", () => {
  if (!videoTrack || !zoomSupported) return;
  const z = parseFloat(zoomSlider.value);
  videoTrack.applyConstraints({ advanced: [{ zoom: z }] }).catch(console.error);
});

gridToggleBtn.addEventListener("click", () => {
  const show = gridOverlay.style.display !== "block";
  gridOverlay.style.display = show ? "block" : "none";
  gridToggleBtn.classList.toggle('active', show);
});

/* 露出 AUTO / MANUAL */
function applyExposureMode() {
  if (!videoTrack || !exposureSupported) return;
  if (exposureMode === "auto") {
    videoTrack.applyConstraints({ advanced: [{ exposureMode: "continuous" }] }).catch(() => {});
  } else {
    const v = parseFloat(exposureSlider.value);
    videoTrack.applyConstraints({ advanced: [{ exposureCompensation: v }] }).catch(console.error);
  }
}

exposureModeBtn.addEventListener("click", () => {
  if (!exposureSupported) return;
  if (exposureMode === "auto") {
    exposureMode = "manual";
    exposureModeBtn.textContent = "MANUAL";
    exposureModeBtn.classList.add('active');
    exposureRow.style.display = "flex";
  } else {
    exposureMode = "auto";
    exposureModeBtn.textContent = "AUTO";
    exposureModeBtn.classList.remove('active');
    exposureRow.style.display = "none";
  }
  applyExposureMode();
});

exposureSlider.addEventListener("input", () => {
  if (exposureMode !== "manual") return;
  applyExposureMode();
});

/* フォーカス AUTO / MANUAL */
function applyFocusMode() {
  if (!videoTrack || !focusDistanceSupported) return;
  if (focusMode === "auto") {
    videoTrack.applyConstraints({ advanced: [{ focusMode: "continuous" }] }).catch(() => {});
  } else {
    const d = parseFloat(focusSlider.value);
    videoTrack.applyConstraints({ advanced: [{ focusMode: "manual", focusDistance: d }] }).catch(console.error);
  }
}

focusModeBtn.addEventListener("click", () => {
  if (!focusDistanceSupported) return;
  if (focusMode === "auto") {
    focusMode = "manual";
    focusModeBtn.textContent = "MANUAL";
    focusModeBtn.classList.add('active');
    focusRow.style.display = "flex";
  } else {
    focusMode = "auto";
    focusModeBtn.textContent = "AUTO";
    focusModeBtn.classList.remove('active');
    focusRow.style.display = "none";
  }
  applyFocusMode();
});

focusSlider.addEventListener("input", () => {
  if (focusMode !== "manual") return;
  applyFocusMode();
});

/* 録画処理 */
function createRecorder() {
  const optionsList = [
    { mimeType: "video/webm;codecs=av1", videoBitsPerSecond: 250000 },
    { mimeType: "video/webm;codecs=vp9", videoBitsPerSecond: 250000 },
    { mimeType: "video/webm;codecs=vp8", videoBitsPerSecond: 250000 },
    {}
  ];
  for (const opt of optionsList) {
    try {
      const r = new MediaRecorder(stream, opt);
      console.log("MediaRecorder created with", opt);
      return r;
    } catch (e) {
      console.warn("MediaRecorder option failed:", opt, e);
    }
  }
  return null;
}

function autoSave(blob) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const now = new Date();
  const fileName =
    "video_" +
    now.getFullYear() +
    ("0" + (now.getMonth() + 1)).slice(-2) +
    ("0" + now.getDate()).slice(-2) + "_" +
    ("0" + now.getHours()).slice(-2) +
    ("0" + now.getMinutes()).slice(-2) +
    ("0" + now.getSeconds()).slice(-2) +
    ".webm";
  a.href = url;
  a.download = fileName;
  a.click();
  URL.revokeObjectURL(url);
}

recordBtn.addEventListener("click", () => {
  if (!recorder) {
    recorder = createRecorder();
    if (!recorder) {
      statusEl.textContent = "録画不可";
      return;
    }
    recorder.ondataavailable = e => {
      if (e.data && e.data.size > 0) chunks.push(e.data);
    };
    recorder.onstop = () => {
      const blob = new Blob(chunks, { type: "video/webm" });
      chunks = [];
      autoSave(blob);
      statusEl.textContent = "保存完了";
      recordBtn.classList.remove("recording");
    };
  }

  if (recorder.state === "inactive") {
    recorder.start();
    recordBtn.classList.add("recording");
    statusEl.textContent = "録画中...";
  } else if (recorder.state === "recording") {
    recorder.stop();
    statusEl.textContent = "保存中...";
  }
});

document.getElementById("applySettings").addEventListener("click", startCamera);

// 初期起動
startCamera();
</script>
</body>
</html>
