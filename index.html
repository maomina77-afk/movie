<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>低容量動画撮影（HTML5）</title>
  <style>
    body { font-family: sans-serif; padding: 10px; }
    video { width: 100%; max-width: 480px; background: #000; }
    button { margin: 5px 0; padding: 8px 12px; font-size: 16px; }
    #status { margin-top: 8px; font-size: 14px; color: #333; }
  </style>
</head>
<body>
  <h1>低容量動画撮影</h1>
  <p>解像度・フレームレート・ビットレートを下げて、ファイル容量を小さくします。</p>

  <video id="preview" autoplay playsinline muted></video><br>

  <button id="startBtn">録画開始</button>
  <button id="stopBtn" disabled>録画停止</button>

  <div id="status">準備中...</div>
  <div id="downloadArea"></div>

  <script>
    const preview = document.getElementById('preview');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const statusEl = document.getElementById('status');
    const downloadArea = document.getElementById('downloadArea');

    let mediaStream = null;
    let mediaRecorder = null;
    let recordedChunks = [];

    // カメラ取得（低解像度・低fps）
    async function initCamera() {
      try {
        const constraints = {
          audio: true,
          video: {
            width: { ideal: 640, max: 640 },
            height: { ideal: 360, max: 360 },
            frameRate: { ideal: 15, max: 15 },
            facingMode: "environment" // 背面カメラ優先（必要に応じて "user"）
          }
        };

        mediaStream = await navigator.mediaDevices.getUserMedia(constraints);
        preview.srcObject = mediaStream;
        statusEl.textContent = 'カメラ準備完了。録画できます。';
      } catch (err) {
        console.error(err);
        statusEl.textContent = 'カメラ取得に失敗しました: ' + err.message;
      }
    }

    // MediaRecorderの初期化（低ビットレート）
    function setupRecorder() {
      if (!mediaStream) {
        statusEl.textContent = 'カメラストリームがありません。';
        return;
      }

      const optionsList = [
        { mimeType: 'video/webm;codecs=vp8', videoBitsPerSecond: 300000 }, // 300kbps
        { mimeType: 'video/webm', videoBitsPerSecond: 300000 },
        {} // フォールバック
      ];

      let recorder = null;
      for (const opt of optionsList) {
        try {
          recorder = new MediaRecorder(mediaStream, opt);
          console.log('MediaRecorder created with options:', opt);
          break;
        } catch (e) {
          console.warn('MediaRecorder option failed:', opt, e);
        }
      }

      if (!recorder) {
        statusEl.textContent = 'このブラウザではMediaRecorderが利用できません。';
        return;
      }

      recorder.ondataavailable = (e) => {
        if (e.data && e.data.size > 0) {
          recordedChunks.push(e.data);
        }
      };

      recorder.onstart = () => {
        recordedChunks = [];
        statusEl.textContent = '録画中...';
      };

      recorder.onstop = () => {
        const blob = new Blob(recordedChunks, { type: 'video/webm' });
        const url = URL.createObjectURL(blob);

        const a = document.createElement('a');
        a.href = url;
        const now = new Date();
        const fileName =
          'low_video_' +
          now.getFullYear() +
          ('0' + (now.getMonth() + 1)).slice(-2) +
          ('0' + now.getDate()).slice(-2) + '_' +
          ('0' + now.getHours()).slice(-2) +
          ('0' + now.getMinutes()).slice(-2) +
          ('0' + now.getSeconds()).slice(-2) +
          '.webm';

        a.download = fileName;
        a.textContent = '録画ファイルをダウンロード (' + (blob.size / 1024).toFixed(1) + ' KB)';
        a.style.display = 'block';
        a.style.marginTop = '8px';

        downloadArea.innerHTML = '';
        downloadArea.appendChild(a);

        statusEl.textContent = '録画完了。ファイルをダウンロードできます。';
      };

      mediaRecorder = recorder;
    }

    startBtn.addEventListener('click', () => {
      if (!mediaRecorder) {
        setupRecorder();
      }
      if (mediaRecorder && mediaRecorder.state === 'inactive') {
        mediaRecorder.start();
        startBtn.disabled = true;
        stopBtn.disabled = false;
      }
    });

    stopBtn.addEventListener('click', () => {
      if (mediaRecorder && mediaRecorder.state === 'recording') {
        mediaRecorder.stop();
        startBtn.disabled = false;
        stopBtn.disabled = true;
      }
    });

    // ページ読み込み時にカメラ初期化
    if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
      initCamera();
    } else {
      statusEl.textContent = 'このブラウザはカメラAPIに対応していません。';
    }
  </script>
</body>
</html>
