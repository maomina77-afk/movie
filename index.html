<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AV1 低容量動画＆写真撮影</title>
<style>
  :root {
    --primary: #ff3b30;
    --primary-active: #ff6b63;
    --recording: #ff3b30;
    --bg-panel: #141414;
    --bg-overlay: rgba(30, 30, 30, 0.8);
    --text: #ffffff;
  }

  body {
    margin: 0;
    padding: 0;
    background: #000;
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    overflow: hidden;
    touch-action: none;
    display: flex;
    flex-direction: column;
    height: 100vh;
    height: 100dvh; 
  }

  /* --- 上部バー --- */
  #topBar {
    flex: 0 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 16px;
    background: var(--bg-panel);
    z-index: 10;
  }

  #status {
    font-size: 14px;
    background: rgba(255,255,255,0.1);
    padding: 4px 12px;
    border-radius: 12px;
    text-align: center;
  }

  .icon-btn {
    background: rgba(255,255,255,0.15);
    border: none;
    color: white;
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 14px;
  }

  /* --- プレビュー領域 --- */
  #previewWrapper {
    flex: 1 1 auto;
    position: relative;
    width: 100vw;
    background: #000;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  video {
    width: 100%;
    height: 100%;
    object-fit: contain; 
  }

  /* グリッド */
  #gridOverlay {
    position: absolute;
    inset: 0;
    pointer-events: none;
    display: none;
    z-index: 2;
  }
  .grid-line {
    position: absolute;
    background: rgba(255,255,255,0.4);
  }
  .grid-v1 { left: 33.33%; top: 0; bottom: 0; width: 1px; }
  .grid-v2 { left: 66.66%; top: 0; bottom: 0; width: 1px; }
  .grid-h1 { top: 33.33%; left: 0; right: 0; height: 1px; }
  .grid-h2 { top: 66.66%; left: 0; right: 0; height: 1px; }

  /* --- 改良版：水準器（iPhone風 ＆ 左端あおりゲージ） --- */
  #levelerOverlay {
    position: absolute;
    inset: 0;
    pointer-events: none;
    display: none; /* 初期は非表示 */
    z-index: 3;
  }

  /* 1. 中央のローリング（左右傾き）UI */
  #levelerRollContainer {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 140px;
    height: 2px;
    transform: translate(-50%, -50%);
  }
  .roll-fixed {
    position: absolute;
    top: 0;
    width: 25px;
    height: 2px;
    background: rgba(255,255,255,0.5);
    transition: background-color 0.2s ease;
  }
  .roll-fixed.left { left: 0; }
  .roll-fixed.right { right: 0; }
  
  #rollMoving {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 70px;
    height: 2px;
    background: white;
    transform: translate(-50%, -50%);
    box-shadow: 0 0 4px rgba(0,0,0,0.8);
    transition: background-color 0.2s ease;
  }

  /* 2. 左端のピッチング（前後のあおり）UI */
  #levelerPitchContainer {
    position: absolute;
    top: 50%;
    left: 16px; /* 左端からの距離 */
    width: 20px;
    height: 200px;
    transform: translateY(-50%);
  }
  .pitch-track {
    position: absolute;
    top: 0;
    bottom: 0;
    left: 50%;
    width: 1px;
    background: rgba(255,255,255,0.3);
    transform: translateX(-50%);
  }
  #pitchCenterMark {
    position: absolute;
    top: 50%;
    left: 0;
    width: 100%;
    height: 2px;
    background: rgba(255,255,255,0.5);
    transform: translateY(-50%);
    transition: background-color 0.2s ease;
  }
  #pitchMoving {
    position: absolute;
    top: 50%;
    left: 0;
    width: 100%;
    height: 2px;
    background: white;
    box-shadow: 0 0 4px rgba(0,0,0,0.8);
    transition: background-color 0.2s ease;
  }

  /* 設定パネル */
  #settingsPanel {
    position: absolute;
    top: 8px;
    right: 16px;
    background: var(--bg-overlay);
    backdrop-filter: blur(8px);
    border-radius: 12px;
    padding: 16px;
    width: 260px;
    display: none;
    z-index: 20;
    border: 1px solid rgba(255,255,255,0.1);
    max-height: 90%;
    overflow-y: auto;
  }
  #settingsPanel.show { display: block; }
  #settingsPanel label { display: block; font-size: 12px; margin-bottom: 4px; color: #ccc; }
  #settingsPanel select { width: 100%; margin-bottom: 12px; padding: 8px; border-radius: 6px; background: #333; color: white; border: none; font-size: 14px;}
  #estimateText { font-size: 12px; color: #88ff88; margin-bottom: 12px; text-align: center; }
  #applySettings { width: 100%; padding: 10px; background: #555; color: white; border: none; border-radius: 6px; font-weight: bold; }

  /* --- 下部コントロール --- */
  #bottomBar {
    flex: 0 0 auto;
    background: var(--bg-panel);
    padding: 16px 16px 32px 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    z-index: 10;
  }

  .control-group {
    background: #222;
    border-radius: 12px;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .row { display: flex; align-items: center; gap: 12px; }
  .row-label { width: 60px; font-size: 12px; text-align: right; color: #aaa; }
  .row-control { flex: 1; display: flex; align-items: center; gap: 8px; }
  
  input[type="range"] { width: 100%; height: 30px; margin: 0; }

  .toggle-btn { flex: 1; background: #333; color: white; border: 1px solid #555; padding: 8px; border-radius: 6px; font-size: 12px; }
  .toggle-btn.active { background: #555; border-color: #888; }

  /* 録画・写真ボタンエリア */
  #recordContainer {
    display: flex;
    align-items: center;
    margin-top: 8px;
    padding: 0 4px;
  }

  #leftStats, #rightActions { flex: 1; }
  
  #leftStats { display: flex; flex-direction: column; gap: 2px; }
  #infoText { font-size: 10px; color: #aaa; line-height: 1.3; }
  #infoTime { font-size: 18px; font-weight: bold; font-variant-numeric: tabular-nums; color: white; }
  #infoTime.active { color: var(--recording); }

  #centerBtn { flex: 0 0 auto; display: flex; justify-content: center; }

  #recordBtn {
    width: 65px;
    height: 65px;
    border-radius: 50%;
    background: var(--primary);
    border: 4px solid white;
    outline: 2px solid transparent;
    box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    transition: all 0.2s ease;
    text-indent: -9999px; 
  }
  #recordBtn:active { transform: scale(0.95); background: var(--primary-active); }
  #recordBtn.recording { background: #34c759; border-radius: 20px; transform: scale(0.8); }

  /* 新機能：写真ボタン */
  #rightActions {
    display: flex;
    justify-content: center;
    align-items: center;
  }
  #snapBtn {
    width: 45px;
    height: 45px;
    border-radius: 50%;
    background: #fff;
    border: 3px solid #ccc;
    color: #333;
    font-size: 10px;
    font-weight: bold;
    box-shadow: 0 2px 6px rgba(0,0,0,0.5);
    transition: all 0.1s ease;
    padding: 0;
  }
  #snapBtn:active { transform: scale(0.9); background: #eee; }

  /* スマホ横向き（ランドスケープ）用 */
  @media (orientation: landscape) {
    body { flex-direction: row; }
    #topBar { flex-direction: column; width: 90px; height: 100%; padding: 16px 8px; box-sizing: border-box; }
    #settingsPanel { top: 16px; left: 100px; right: auto; }
    #bottomBar { width: 340px; height: 100%; padding: 16px 24px; box-sizing: border-box; overflow-y: auto; justify-content: center; }
    #recordContainer { margin-top: 24px; }
    #previewWrapper { width: auto; }
  }
</style>
</head>
<body>

<div id="topBar">
  <button id="gridToggleBtn" class="icon-btn">Glid</button>
  <div id="status">待機中</div>
  <button id="settingsToggleBtn" class="icon-btn">⚙ 設定</button>
</div>

<div id="previewWrapper">
  <video id="preview" autoplay playsinline muted></video>
  
  <div id="gridOverlay">
    <div class="grid-line grid-v1"></div>
    <div class="grid-line grid-v2"></div>
    <div class="grid-line grid-h1"></div>
    <div class="grid-line grid-h2"></div>
  </div>

  <div id="levelerOverlay">
    <div id="levelerRollContainer">
      <div class="roll-fixed left"></div>
      <div class="roll-fixed right"></div>
      <div id="rollMoving"></div>
    </div>
    
    <div id="levelerPitchContainer">
      <div class="pitch-track"></div>
      <div id="pitchCenterMark"></div>
      <div id="pitchMoving"></div>
    </div>
  </div>

  <div id="settingsPanel">
    <label>水準器（水平・あおり）：</label>
    <select id="levelerToggle">
      <option value="off">OFF</option>
      <option value="on">ON</option>
    </select>

    <label>解像度（基準値）：</label>
    <select id="resolution">
      <option value="720x540">720 × 540（標準）</option>
      <option value="240x180">240 × 180（超低容量）</option>
      <option value="1440x1080">1440 × 1080（高画質）</option>
    </select>

    <label>FPS：</label>
    <select id="fps">
      <option value="10">10 fps</option>
      <option value="15">15 fps</option>
      <option value="30">30 fps</option>
    </select>

    <label>ビットレート：</label>
    <select id="bitrate">
      <option value="250000">250 kbps（標準）</option>
      <option value="500000">500 kbps</option>
      <option value="1000000">1000 kbps</option>
      <option value="2500000">2500 kbps</option>
    </select>

    <div id="estimateText">目安: 10分で約 -- MB</div>
    <button id="applySettings">適用（再起動）</button>
  </div>
</div>

<div id="bottomBar">
  <div class="control-group">
    <div class="row">
      <div class="row-label">ズーム</div>
      <div class="row-control">
        <input id="zoomSlider" type="range" min="1" max="1" step="0.01" value="1">
      </div>
    </div>
    <div class="row">
      <div class="row-label">露出</div>
      <div class="row-control">
        <button id="exposureModeBtn" class="toggle-btn">AUTO</button>
      </div>
    </div>
    <div class="row" id="exposureRow" style="display:none;">
      <div class="row-label"></div>
      <div class="row-control">
        <input id="exposureSlider" type="range" min="0" max="0" step="1" value="0">
      </div>
    </div>
    <div class="row">
      <div class="row-label">フォーカス</div>
      <div class="row-control">
        <button id="focusModeBtn" class="toggle-btn">AUTO</button>
      </div>
    </div>
    <div class="row" id="focusRow" style="display:none;">
      <div class="row-label"></div>
      <div class="row-control">
        <input id="focusSlider" type="range" min="0" max="1" step="0.01" value="0">
      </div>
    </div>
  </div>

  <div id="recordContainer">
    <div id="leftStats">
      <div id="infoText">--<br>-- / --</div>
      <div id="infoTime">00:00</div>
    </div>
    <div id="centerBtn">
      <button id="recordBtn">録画開始</button>
    </div>
    <div id="rightActions">
      <button id="snapBtn">写真</button>
    </div>
  </div>
</div>

<script>
// --- UI制御・設定の保存 ---
const settingsToggleBtn = document.getElementById('settingsToggleBtn');
const settingsPanel = document.getElementById('settingsPanel');
const resSelect = document.getElementById("resolution");
const fpsSelect = document.getElementById("fps");
const bitrateSelect = document.getElementById("bitrate");
const levelerToggle = document.getElementById("levelerToggle");
const estimateText = document.getElementById("estimateText");
const infoText = document.getElementById("infoText");
const infoTime = document.getElementById("infoTime");
const levelerOverlay = document.getElementById("levelerOverlay");

let levelerActive = false;

settingsToggleBtn.addEventListener('click', () => {
  settingsPanel.classList.toggle('show');
});

function loadSettings() {
  const sRes = localStorage.getItem("av1_res");
  const sFps = localStorage.getItem("av1_fps");
  const sBit = localStorage.getItem("av1_bitrate");
  const sLev = localStorage.getItem("av1_leveler");
  
  if(sRes) resSelect.value = sRes; else resSelect.value = "720x540";
  if(sFps) fpsSelect.value = sFps; else fpsSelect.value = "10";
  if(sBit) bitrateSelect.value = sBit; else bitrateSelect.value = "250000";
  if(sLev) levelerToggle.value = sLev; else levelerToggle.value = "off";
  
  updateDisplayData();
  updateLevelerVisibility();
}

function saveSettings() {
  localStorage.setItem("av1_res", resSelect.value);
  localStorage.setItem("av1_fps", fpsSelect.value);
  localStorage.setItem("av1_bitrate", bitrateSelect.value);
  localStorage.setItem("av1_leveler", levelerToggle.value);
}

function updateLevelerVisibility() {
  levelerActive = (levelerToggle.value === "on");
  levelerOverlay.style.display = levelerActive ? "block" : "none";
}

function updateDisplayData() {
  const bps = parseInt(bitrateSelect.value, 10);
  const bytes = (bps * 600) / 8;
  const mb = (bytes / (1024 * 1024)).toFixed(1);
  estimateText.textContent = `目安: 10分で約 ${mb} MB`;

  const isPortrait = window.innerHeight > window.innerWidth;
  const res = resSelect.value.split("x");
  let displayRes = isPortrait ? `${res[1]}x${res[0]}` : `${res[0]}x${res[1]}`;
  const kbpsText = bps >= 1000000 ? (bps/1000000).toFixed(1) + 'M' : (bps/1000) + 'k';
  infoText.innerHTML = `${displayRes}<br>${fpsSelect.value}fps / ${kbpsText}bps`;
}

resSelect.addEventListener("change", updateDisplayData);
fpsSelect.addEventListener("change", updateDisplayData);
bitrateSelect.addEventListener("change", updateDisplayData);
levelerToggle.addEventListener("change", async (e) => {
  // iOS Safari用 センサー許可
  if (e.target.value === "on" && typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
    try {
      const permission = await DeviceOrientationEvent.requestPermission();
      if (permission !== 'granted') {
        alert("傾きセンサーへのアクセスが拒否されました。");
        e.target.value = "off";
      }
    } catch (err) { console.error(err); }
  }
  updateLevelerVisibility();
});

document.getElementById("applySettings").addEventListener("click", () => {
  saveSettings();
  settingsPanel.classList.remove('show');
  startCamera(); 
});

// --- カメラ・録画制御 ---
let stream, recorder, chunks = [];
let videoTrack, capabilities, settings;
let zoomSupported, exposureSupported, focusDistanceSupported;
let exposureMode = "auto", focusMode = "auto";
let timerInterval = null;
let recordingStartTime = 0;

const preview = document.getElementById("preview");
const statusEl = document.getElementById("status");
const zoomSlider = document.getElementById("zoomSlider");
const gridOverlay = document.getElementById("gridOverlay");
const gridToggleBtn = document.getElementById("gridToggleBtn");
const exposureModeBtn = document.getElementById("exposureModeBtn");
const exposureRow = document.getElementById("exposureRow");
const exposureSlider = document.getElementById("exposureSlider");
const focusModeBtn = document.getElementById("focusModeBtn");
const focusRow = document.getElementById("focusRow");
const focusSlider = document.getElementById("focusSlider");
const recordBtn = document.getElementById("recordBtn");
const snapBtn = document.getElementById("snapBtn");

async function startCamera() {
  if (stream) stream.getTracks().forEach(t => t.stop());
  
  const res = resSelect.value.split("x");
  let baseW = parseInt(res[0], 10);
  let baseH = parseInt(res[1], 10);

  let idealW = baseW;
  let idealH = baseH;
  if (window.innerHeight > window.innerWidth) {
    idealW = baseH; idealH = baseW;
  }

  const fps = parseInt(fpsSelect.value, 10);
  const constraints = {
    audio: true,
    video: {
      width: { ideal: idealW },
      height: { ideal: idealH },
      frameRate: { ideal: fps },
      facingMode: "environment"
    }
  };
  
  try {
    stream = await navigator.mediaDevices.getUserMedia(constraints);
    preview.srcObject = stream;
    statusEl.textContent = "待機中";
    videoTrack = stream.getVideoTracks()[0];
    capabilities = videoTrack.getCapabilities();
    settings = videoTrack.getSettings();
    setupControls();
    updateDisplayData(); 
  } catch (e) {
    statusEl.textContent = "取得失敗";
  }
}

let resizeTimer;
window.addEventListener("resize", () => {
  if (!recorder || recorder.state === "inactive") {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => { startCamera(); }, 500); 
  }
});

function setupControls() {
  zoomSupported = !!capabilities.zoom;
  exposureSupported = !!capabilities.exposureCompensation;
  focusDistanceSupported = !!capabilities.focusDistance;

  if (zoomSupported) {
    zoomSlider.min = capabilities.zoom.min;
    zoomSlider.max = capabilities.zoom.max;
    zoomSlider.step = capabilities.zoom.step || 0.1;
    zoomSlider.value = settings.zoom || capabilities.zoom.min;
    zoomSlider.disabled = false;
  } else {
    zoomSlider.min = 1; zoomSlider.max = 1; zoomSlider.value = 1; zoomSlider.disabled = true;
  }
  if (exposureSupported) {
    const min = capabilities.exposureCompensation.min; const max = capabilities.exposureCompensation.max;
    exposureSlider.min = min; exposureSlider.max = max; exposureSlider.step = capabilities.exposureCompensation.step || 1;
    exposureSlider.value = settings.exposureCompensation || 0;
    exposureMode = "auto"; exposureModeBtn.textContent = "AUTO"; exposureRow.style.display = "none";
  } else { exposureModeBtn.disabled = true; exposureModeBtn.textContent = "未対応"; }
  if (focusDistanceSupported) {
    const min = capabilities.focusDistance.min || 0; const max = capabilities.focusDistance.max || 1;
    focusSlider.min = min; focusSlider.max = max; focusSlider.step = capabilities.focusDistance.step || 0.01;
    focusSlider.value = settings.focusDistance || min;
    focusMode = "auto"; focusModeBtn.textContent = "AUTO"; focusRow.style.display = "none";
  } else { focusModeBtn.disabled = true; focusModeBtn.textContent = "未対応"; }
  applyExposureMode();
  applyFocusMode();
}

zoomSlider.addEventListener("input", () => {
  if (!videoTrack || !zoomSupported) return;
  videoTrack.applyConstraints({ advanced: [{ zoom: parseFloat(zoomSlider.value) }] }).catch(console.error);
});
gridToggleBtn.addEventListener("click", () => {
  const show = gridOverlay.style.display !== "block";
  gridOverlay.style.display = show ? "block" : "none";
  gridToggleBtn.classList.toggle('active', show);
});
function applyExposureMode() {
  if (!videoTrack || !exposureSupported) return;
  if (exposureMode === "auto") videoTrack.applyConstraints({ advanced: [{ exposureMode: "continuous" }] }).catch(() => {});
  else videoTrack.applyConstraints({ advanced: [{ exposureCompensation: parseFloat(exposureSlider.value) }] }).catch(console.error);
}
exposureModeBtn.addEventListener("click", () => {
  if (!exposureSupported) return;
  if (exposureMode === "auto") { exposureMode = "manual"; exposureModeBtn.textContent = "MANUAL"; exposureModeBtn.classList.add('active'); exposureRow.style.display = "flex"; } 
  else { exposureMode = "auto"; exposureModeBtn.textContent = "AUTO"; exposureModeBtn.classList.remove('active'); exposureRow.style.display = "none"; }
  applyExposureMode();
});
exposureSlider.addEventListener("input", () => { if (exposureMode === "manual") applyExposureMode(); });

function applyFocusMode() {
  if (!videoTrack || !focusDistanceSupported) return;
  if (focusMode === "auto") videoTrack.applyConstraints({ advanced: [{ focusMode: "continuous" }] }).catch(() => {});
  else videoTrack.applyConstraints({ advanced: [{ focusMode: "manual", focusDistance: parseFloat(focusSlider.value) }] }).catch(console.error);
}
focusModeBtn.addEventListener("click", () => {
  if (!focusDistanceSupported) return;
  if (focusMode === "auto") { focusMode = "manual"; focusModeBtn.textContent = "MANUAL"; focusModeBtn.classList.add('active'); focusRow.style.display = "flex"; } 
  else { focusMode = "auto"; focusModeBtn.textContent = "AUTO"; focusModeBtn.classList.remove('active'); focusRow.style.display = "none"; }
  applyFocusMode();
});
focusSlider.addEventListener("input", () => { if (focusMode === "manual") applyFocusMode(); });

/* --- 写真撮影処理 --- */
snapBtn.addEventListener("click", () => {
  if (!stream) return;
  const flash = document.createElement("div");
  flash.style.position = "fixed"; flash.style.inset = "0"; flash.style.backgroundColor = "white";
  flash.style.zIndex = "100"; flash.style.opacity = "1"; flash.style.transition = "opacity 0.2s ease-out";
  document.body.appendChild(flash);
  setTimeout(() => { flash.style.opacity = "0"; }, 50);
  setTimeout(() => { flash.remove(); }, 250);

  const canvas = document.createElement("canvas");
  canvas.width = preview.videoWidth; canvas.height = preview.videoHeight;
  const ctx = canvas.getContext("2d");
  ctx.drawImage(preview, 0, 0, canvas.width, canvas.height);
  
  const dataUrl = canvas.toDataURL("image/jpeg", 0.95); 
  const a = document.createElement("a");
  const now = new Date();
  const f = "photo_" + now.getFullYear() + ("0"+(now.getMonth()+1)).slice(-2) + ("0"+now.getDate()).slice(-2) + "_" + ("0"+now.getHours()).slice(-2) + ("0"+now.getMinutes()).slice(-2) + ("0"+now.getSeconds()).slice(-2) + ".jpg";
  a.href = dataUrl; a.download = f; a.click();
});

/* --- 水準器 処理（3D重力ベクトル方式・完全対応版） --- */
window.addEventListener("deviceorientation", (e) => {
  if (!levelerActive) return;

  let b = e.beta;
  let g = e.gamma;
  if (b === null || g === null) return;

  // 角度をラジアンに変換
  const radB = b * Math.PI / 180;
  const radG = g * Math.PI / 180;

  // スマホ本体を基準とした重力ベクトル（X, Y, Z）を計算
  // これにより、端末がどの向きに回転していても正確な重力の方向がわかります
  const gx = Math.cos(radB) * Math.sin(radG);
  const gy = Math.sin(radB);
  const gz = Math.cos(radB) * Math.cos(radG);

  // 画面の向き（縦持ち・横持ち）に合わせて、画面基準のベクトル（sx, sy, sz）に変換
  const angle = (screen.orientation || {}).angle || window.orientation || 0;
  let sx, sy, sz;

  if (angle === 90) {
    // 横持ち（左側が下）
    sx = gy;
    sy = -gx;
    sz = gz;
  } else if (angle === -90 || angle === 270) {
    // 横持ち（右側が下）
    sx = -gy;
    sy = gx;
    sz = gz;
  } else if (angle === 180) {
    // 縦持ち（逆さま）
    sx = -gx;
    sy = -gy;
    sz = gz;
  } else {
    // 縦持ち（標準）
    sx = gx;
    sy = gy;
    sz = gz;
  }

  // ロール（左右の傾き）と ピッチ（前後のあおり）を計算
  // Math.atan2 を使うことで、常に「レンズを前に向けてスマホが垂直に立っている状態」が 0度 になります
  let roll = Math.atan2(sx, sy) * 180 / Math.PI;
  let pitch = Math.atan2(sz, sy) * 180 / Math.PI;

  // UIの取得
  const rollMoving = document.getElementById("rollMoving");
  const rollFixed = document.querySelectorAll(".roll-fixed");
  const pitchMoving = document.getElementById("pitchMoving");
  const pitchCenterMark = document.getElementById("pitchCenterMark");

  // 【1】ローリングの反映（左右の傾き）
  rollMoving.style.transform = `translate(-50%, -50%) rotate(${-roll}deg)`;

  // 【2】ピッチング（あおり）の反映
  // カメラを下に向けるとバーが上がり、上に向けると下がる（飛行機の人工水平儀と同じ直感的な動き）
  let pitchY = Math.max(-90, Math.min(90, -pitch * 2));
  pitchMoving.style.transform = `translateY(calc(-50% + ${pitchY}px))`;

  // 【3】色の判定と反映（水平・垂直ともに±1.5度以内なら緑色に光る）
  const isRollLevel = Math.abs(roll) < 1.5;
  const isPitchLevel = Math.abs(pitch) < 1.5;
  const colorGreen = "#34c759";
  const colorWhite = "#ffffff";
  const colorFaded = "rgba(255,255,255,0.5)";

  rollMoving.style.backgroundColor = isRollLevel ? colorGreen : colorWhite;
  rollFixed.forEach(el => el.style.backgroundColor = isRollLevel ? colorGreen : colorFaded);

  pitchMoving.style.backgroundColor = isPitchLevel ? colorGreen : colorWhite;
  pitchCenterMark.style.backgroundColor = isPitchLevel ? colorGreen : colorFaded;
});
/* --- 録画処理 --- */
function createRecorder() {
  const bps = parseInt(bitrateSelect.value, 10);
  const optionsList = [
    { mimeType: "video/webm;codecs=av1", videoBitsPerSecond: bps },
    { mimeType: "video/webm;codecs=vp9", videoBitsPerSecond: bps },
    { mimeType: "video/webm;codecs=vp8", videoBitsPerSecond: bps },
    {}
  ];
  for (const opt of optionsList) {
    try { return new MediaRecorder(stream, opt); } catch (e) { console.warn("Option failed:", opt); }
  }
  return null;
}

function autoSave(blob) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const now = new Date();
  const f = "video_" + now.getFullYear() + ("0"+(now.getMonth()+1)).slice(-2) + ("0"+now.getDate()).slice(-2) + "_" + ("0"+now.getHours()).slice(-2) + ("0"+now.getMinutes()).slice(-2) + ("0"+now.getSeconds()).slice(-2) + ".webm";
  a.href = url; a.download = f; a.click(); URL.revokeObjectURL(url);
}

function updateTimerDisplay() {
  const now = Date.now();
  const diff = Math.floor((now - recordingStartTime) / 1000);
  const m = String(Math.floor(diff / 60)).padStart(2, "0");
  const s = String(diff % 60).padStart(2, "0");
  infoTime.textContent = `${m}:${s}`;
}

recordBtn.addEventListener("click", () => {
  if (!recorder) {
    recorder = createRecorder();
    if (!recorder) { statusEl.textContent = "録画不可"; return; }
    recorder.ondataavailable = e => { if (e.data && e.data.size > 0) chunks.push(e.data); };
    recorder.onstop = () => {
      const blob = new Blob(chunks, { type: "video/webm" });
      chunks = [];
      autoSave(blob);
      statusEl.textContent = "保存完了";
      recordBtn.classList.remove("recording");
      clearInterval(timerInterval);
      infoTime.classList.remove("active");
      infoTime.textContent = "00:00";
      snapBtn.disabled = false;
      snapBtn.style.opacity = "1";
    };
  }

  if (recorder.state === "inactive") {
    recorder.start();
    recordBtn.classList.add("recording");
    statusEl.textContent = "録画中...";
    recordingStartTime = Date.now();
    infoTime.textContent = "00:00";
    infoTime.classList.add("active");
    timerInterval = setInterval(updateTimerDisplay, 1000);
    snapBtn.disabled = true;
    snapBtn.style.opacity = "0.3";
  } else if (recorder.state === "recording") {
    recorder.stop();
    statusEl.textContent = "保存中...";
  }
});

// --- 初期起動 ---
loadSettings(); 
startCamera();
</script>
